<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC Contract Optimizer - Multi-Type Routing</title>
<style>
        :root {
            --accent: #f97316;
            --accent-hover: #ff8c42;
            --accent-text: #0f0f0f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; 
            background: #0f0f0f; 
            color: #e0e0e0; 
            padding: 16px; 
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 { 
            font-size: 28px; 
            margin-bottom: 20px; 
            color: #ffffff; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        h2 { 
            font-size: 12px; 
            color: #ffffff; 
            margin-top: 16px; 
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1.5px;
        }
        .wip { 
            color: var(--accent); 
            font-size: 10px; 
        }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .panel { background: #1a1a1a; border: 1px solid #2a2a2a; padding: 16px; }
        .control-group { margin-bottom: 8px; display: flex; gap: 8px; align-items: center; }
        label { font-size: 10px; color: #999; text-transform: uppercase; min-width: 70px; font-weight: 700; letter-spacing: 1px; }
        select, input { flex: 1; padding: 7px 8px; background: #262626; color: #e0e0e0; border: 1px solid #333; font-family: inherit; font-size: 11px; cursor: pointer; transition: all 0.2s; }
        select:focus, input:focus { outline: none; border-color: var(--accent); background: #2a2a2a; }
        .toggle-btn { padding: 8px; background: #262626; color: #999; border: 1px solid #333; font-family: inherit; font-size: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: all 0.2s; letter-spacing: 1px; flex: 1; }
        .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
        .toggle-btn.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
        button { padding: 8px 12px; background: var(--accent); color: var(--accent-text); border: 1px solid var(--accent); font-family: inherit; font-size: 10px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; margin-right: 6px; margin-bottom: 6px; }
        button:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
        .locations-grid { display: grid; grid-template-columns: 1fr; gap: 6px; margin-bottom: 8px; }
        .loc-select { display: grid; grid-template-columns: 18px 1fr 50px; gap: 6px; align-items: center; font-size: 11px; padding: 7px; background: #262626; border: 1px solid #333; }
        .loc-select strong { color: var(--accent); text-align: center; font-size: 10px; min-width: 15px; }
        .loc-select select { padding: 5px 6px; font-size: 10px; flex: 1; margin: 0; }
        .loc-select input { padding: 5px 6px; font-size: 10px; width: 48px; margin: 0; }
        .ship-status { background: #1f3a1f; border: 1px solid #2a5a2a; padding: 8px; margin: 8px 0; font-size: 10px; }
        .cargo-ok { color: #4ade80; }
        .cargo-warn { color: var(--accent); }
        .cargo-critical { color: #ff6b6b; }
        .section-label { color: var(--accent); font-size: 10px; font-weight: 700; margin-top: 12px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .split-contract { background: #262626; border: 1px solid #333; padding: 10px; margin-bottom: 8px; }
        .split-contract h3 { font-size: 10px; color: var(--accent); margin-bottom: 6px; font-weight: 700; text-transform: uppercase; }
        .remove-contract { padding: 4px 8px; font-size: 9px; background: #3a1a1a; border: 1px solid #662222; color: #ff6b6b; }
        .remove-contract:hover { background: #ff6b6b; color: #0f0f0f; border-color: #ff6b6b; }
        #route { grid-column: 1 / -1; white-space: pre-wrap; background: #262626; padding: 12px; border: 1px solid #333; min-height: 350px; font-size: 11px; line-height: 1.5; font-family: 'Courier New', monospace; overflow-y: auto; max-height: 700px; color: #e0e0e0; }
    </style>
</head>
<body>
	<h1>⚡ CONTRACT OPTIMIZER PRO</h1>
		
		<!-- === THEME SELECTOR === -->
		<div style="text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; align-items: center;">
			<strong style="color: #999; font-size: 13px; margin-right: 8px;">THEME:</strong>
			<button onclick="setTheme('default')" style="width: 42px; height: 42px; border-radius: 50%; background: #f97316; border: 3px solid #fff; box-shadow: 0 0 0 1px #333; cursor: pointer;" title="Default Orange"></button>
			<button onclick="setTheme('purple')" style="width: 42px; height: 42px; border-radius: 50%; background: #a855f7; border: 3px solid #fff; box-shadow: 0 0 0 1px #333; cursor: pointer;" title="Purple"></button>
			<button onclick="setTheme('green')" style="width: 42px; height: 42px; border-radius: 50%; background: #22c55e; border: 3px solid #fff; box-shadow: 0 0 0 1px #333; cursor: pointer;" title="Green"></button>
			<button onclick="setTheme('blue')" style="width: 42px; height: 42px; border-radius: 50%; background: #3b82f6; border: 3px solid #fff; box-shadow: 0 0 0 1px #333; cursor: pointer;" title="Blue"></button>
		</div>
    
    <div class="main-grid">
        <div class="panel">
            <h2>FILTER & SHIP</h2>
            <div class="control-group">
                <label>System:</label>
                <select id="systemFilter" onchange="filterLocations()">
                    <option value="">All</option>
                    <option value="Pyro">Pyro</option>
                    <option value="Stanton">Stanton <span class="wip">WIP</span></option>
                    <option value="Nyx">Nyx <span class="wip">WIP</span></option>
                </select>
            </div>
            <div class="control-group">
                <label>Ship:</label>
                <select id="shipSelect" onchange="updateShipStatus()">
                    <option value="">-- Select Ship --</option>
                    <optgroup label="LIGHT (30-99 SCU)">
                        <option value="cutlass_black" data-capacity="46">Cutlass Black (46 SCU)</option>
                        <option value="corsair" data-capacity="72">Corsair (72 SCU)</option>
                        <option value="freelancer" data-capacity="66">Freelancer (66 SCU)</option>
                        <option value="argo_raft" data-capacity="96">Argo RAFT (96 SCU)</option>
                    </optgroup>
                    <optgroup label="MEDIUM (100-999 SCU)">
                        <option value="mercury_star_runner" data-capacity="114">Mercury Star Runner (114 SCU)</option>
                        <option value="freelancer_max" data-capacity="120">Freelancer Max (120 SCU)</option>
                        <option value="hull_a" data-capacity="120">Hull A (120 SCU)</option>
                        <option value="starfarer" data-capacity="170">Starfarer (170 SCU)</option>
                        <option value="taurus" data-capacity="174">Constellation Taurus (174 SCU)</option>
                        <option value="hermes" data-capacity="288">RSI Hermes (288 SCU)</option>
                        <option value="carrack" data-capacity="456">Anvil Carrack (456 SCU)</option>
                        <option value="hull_b" data-capacity="512">Hull B (512 SCU)</option>
                        <option value="caterpillar" data-capacity="576">Caterpillar (576 SCU)</option>
                        <option value="railen" data-capacity="640">Gatac Railen (640 SCU)</option>
                        <option value="c2" data-capacity="696">C2 Hercules (696 SCU)</option>
                    </optgroup>
                    <optgroup label="HEAVY (1000+ SCU)">
                        <option value="ironclad_assault" data-capacity="1440">Drake Ironclad Assault (1,440 SCU)</option>
                        <option value="ironclad" data-capacity="2204">Drake Ironclad (2,204 SCU)</option>
                        <option value="hull_c" data-capacity="4096">Hull C (4,096 SCU)</option>
                    </optgroup>
                </select>
            </div>
            <div id="shipStatus" class="ship-status" style="display:none;"></div>

            <h2>CONTRACT TYPE</h2>
            <div class="toggle-group">
                <button class="toggle-btn active" onclick="setContractType('single-multi')">Single Pick<br>Multi Drop</button>
                <button class="toggle-btn" onclick="setContractType('multi-single')">Multi Pick<br>Single Drop</button>
            </div>

            <h2>START</h2>
            <div class="control-group">
                <select id="startLocation"></select>
            </div>

            <h2 id="pickupLabel">PICKUPS</h2>
            <div id="pickups" class="locations-grid"></div>
        </div>

        <div class="panel">
            <h2 id="dropoffLabel">DROPOFFS</h2>
            <div id="deliveries" class="locations-grid"></div>
            
            <div class="section-label" style="margin-top: 16px;">SPLIT CONTRACTS</div>
            <button onclick="addSplitContract()" style="margin-top: 8px;">+ New Contract</button>
            
            <div id="splitContracts" style="margin-top: 12px;"></div>

            <button onclick="calculateRoute()" style="margin-top: 16px; width: 100%; padding: 12px;">CALCULATE ROUTES</button>
        </div>
    </div>

    <div id="route"></div>

    <script>
const locations = [
            {name: "Checkmate", sys: "Pyro", lat: 0.01, lon: -5.19, dist: 10.59},
            {name: "Dudley & Daughters", sys: "Pyro", lat: 0.00, lon: -155.25, dist: 68.33},
            {name: "Endgame (Terminus L3)", sys: "Pyro", lat: 0.00, lon: -40.23, dist: 68.29},
            {name: "Gaslight", sys: "Pyro", lat: 0.02, lon: -95.22, dist: 47.21},
            {name: "Megumi Refueling (Terminus L5)", sys: "Pyro", lat: 0.01, lon: 64.77, dist: 68.29},
            {name: "Orbituary", sys: "Pyro", lat: 0.00, lon: 154.76, dist: 17.8},
            {name: "Patch City", sys: "Pyro", lat: 0.00, lon: -35.26, dist: 17.79},
            {name: "Rat's Nest (Pyro V L5)", sys: "Pyro", lat: 0.02, lon: -170.24, dist: 42.92},
            {name: "Rod's Fuel 'N Supplies (Pyro V L4)", sys: "Pyro", lat: -0.01, lon: -15.20, dist: 42.92},
            {name: "Ruin Station", sys: "Pyro", lat: 0.00, lon: 134.77, dist: 68.32},
            {name: "Starlight Service Station", sys: "Pyro", lat: 0.00, lon: 155.79, dist: 160.1},
            {name: "Stanton Gateway", sys: "Pyro", lat: 0.00, lon: 49.90, dist: 53.06}
			<!-- {name: "Area18 (ArcCorp) [WIP]", sys: "Stanton", lat: 0, lon: 0, dist: 999}, -->
            <!-- {name: "Baijini Point [WIP]", sys: "Stanton", lat: 0, lon: 0, dist: 999}, -->
            <!-- {name: "Grim HEX [WIP]", sys: "Stanton", lat: 0, lon: 0, dist: 999}, -->
            <!-- {name: "Lorville (Hurston) [WIP]", sys: "Stanton", lat: 0, lon: 0, dist: 999}, -->
            <!-- {name: "New Babbage (microTech) [WIP]", sys: "Stanton", lat: 0, lon: 0, dist: 999}, -->
            <!-- {name: "Orison (Crusader) [WIP]", sys: "Stanton", lat: 0, lon: 0, dist: 999}, -->
            <!-- {name: "Levski (Delamar) [WIP]", sys: "Nyx", lat: 0, lon: 0, dist: 999} -->
        ].sort((a, b) => a.name.localeCompare(b.name));  // ← Fixed: now close to Megumi

        let contractType = 'single-multi';
        let splitContractCount = 0;
        let maxPickups = 1;
        let maxDeliveries = 10;

        function setContractType(type) {
            contractType = type;
            document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
            
            if (type === 'single-multi') {
                maxPickups = 1;
                maxDeliveries = 10;
                document.getElementById('pickupLabel').textContent = 'PICKUP (1)';
                document.getElementById('dropoffLabel').textContent = 'DROPOFFS (up to 10)';
                document.getElementById('pickups').innerHTML = '';
                for (let i = 1; i <= 1; i++) addPickupRow(i);
            } else {
                maxPickups = 10;
                maxDeliveries = 1;
                document.getElementById('pickupLabel').textContent = 'PICKUPS (up to 10)';
                document.getElementById('dropoffLabel').textContent = 'DROPOFF (1)';
                document.getElementById('pickups').innerHTML = '';
                for (let i = 1; i <= 10; i++) addPickupRow(i);
            }
            document.getElementById('deliveries').innerHTML = '';
            for (let i = 1; i <= maxDeliveries; i++) addDeliveryRow(i);
            populateAllOptions();
        }

        function sphericalToCartesian(lat, lon, dist) {
            const latRad = (lat * Math.PI) / 180;
            const lonRad = (lon * Math.PI) / 180;
            return {
                x: dist * Math.cos(latRad) * Math.cos(lonRad),
                y: dist * Math.cos(latRad) * Math.sin(lonRad),
                z: dist * Math.sin(latRad)
            };
        }

        function getDistance(locNameA, locNameB) {
            if (!locNameA || !locNameB) return 9999;
            const locA = locations.find(l => l.name === locNameA);
            const locB = locations.find(l => l.name === locNameB);
            if (!locA || !locB) return 9999;
            if (locA.sys !== locB.sys) return 9999;
            
            const posA = sphericalToCartesian(locA.lat, locA.lon, locA.dist);
            const posB = sphericalToCartesian(locB.lat, locB.lon, locB.dist);
            const dx = posB.x - posA.x;
            const dy = posB.y - posA.y;
            const dz = posB.z - posA.z;
            return Math.sqrt(dx * dx + dy * dy + dz * dz);
        }

        function populateStart() {
            const sel = document.getElementById('startLocation');
            sel.innerHTML = '<option value="">[ No specific start ]</option>';
            locations.forEach(loc => {
                const opt = document.createElement('option');
                opt.value = loc.name;
                opt.textContent = `${loc.name} (${loc.sys})`;
                sel.appendChild(opt);
            });
        }

        function addPickupRow(idx) {
            const container = document.getElementById('pickups');
            const div = document.createElement('div');
            div.className = 'loc-select';
            div.innerHTML = `<strong>${idx}</strong><select id="pickup${idx}"></select><input type="number" id="cargo-pickup${idx}" placeholder="SCU" min="0">`;
            container.appendChild(div);
            
            // Attach change listeners to this row
            const select = div.querySelector('select');
            const cargoInput = div.querySelector('input');
            if (select) {
                select.addEventListener('change', updateShipStatus);
            }
            if (cargoInput) {
                cargoInput.addEventListener('change', updateShipStatus);
                cargoInput.addEventListener('input', updateShipStatus);
            }
        }

        function addDeliveryRow(idx) {
            const container = document.getElementById('deliveries');
            const div = document.createElement('div');
            div.className = 'loc-select';
            
            // For multi-to-single, only show 1 dropoff without cargo input
            if (contractType === 'multi-single') {
                div.innerHTML = `<strong>${idx}</strong><select id="delivery${idx}"></select>`;
            } else {
                // For single-to-multi, show cargo input
                div.innerHTML = `<strong>${idx}</strong><select id="delivery${idx}"></select><input type="number" id="cargo-delivery${idx}" placeholder="SCU" min="0">`;
            }
            
            container.appendChild(div);
            
            // Attach change listeners to this row
            const select = div.querySelector('select');
            if (select) {
                select.addEventListener('change', updateShipStatus);
            }
            const cargoInput = div.querySelector('input');
            if (cargoInput) {
                cargoInput.addEventListener('change', updateShipStatus);
                cargoInput.addEventListener('input', updateShipStatus);
            }
        }

        function addSplitContract() {
            splitContractCount++;
            const container = document.getElementById('splitContracts');
            const contract = document.createElement('div');
            contract.className = 'split-contract';
            contract.id = `split-${splitContractCount}`;
            contract.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <strong style="color: #0aa;">CONTRACT ${splitContractCount}</strong>
                    <button class="remove-contract" onclick="removeSplitContract(${splitContractCount})">✕ Remove</button>
                </div>
                <div class="control-group">
                    <label>From:</label>
                    <select id="split-from-${splitContractCount}"></select>
                </div>
                <div class="control-group">
                    <label>To:</label>
                    <select id="split-to-${splitContractCount}"></select>
                </div>
                <div class="control-group">
                    <label>Cargo:</label>
                    <input type="number" id="split-cargo-${splitContractCount}" placeholder="SCU" min="0">
                </div>
            `;
            container.appendChild(contract);
            populateAllOptions();
        }

        function removeSplitContract(id) {
            document.getElementById(`split-${id}`).remove();
        }

        function populateAllOptions() {
            document.querySelectorAll('select').forEach(sel => {
                if (['systemFilter', 'shipSelect', 'startLocation'].includes(sel.id)) return;
                sel.innerHTML = '<option value="">[ Skip ]</option>';
                locations.forEach(loc => {
                    const opt = document.createElement('option');
                    opt.value = loc.name;
                    opt.textContent = `${loc.name} (${loc.sys}) - ${loc.dist}GM`;
                    sel.appendChild(opt);
                });
            });
        }

        function filterLocations() {
            const filter = document.getElementById('systemFilter').value;
            document.querySelectorAll('select').forEach(select => {
                if (['systemFilter', 'shipSelect'].includes(select.id)) return;
                Array.from(select.options).forEach(opt => {
                    if (!opt.value) return;
                    const loc = locations.find(l => l.name === opt.value);
                    if (loc) opt.style.display = (!filter || loc.sys === filter) ? '' : 'none';
                });
            });
        }

        function updateShipStatus() {
            const select = document.getElementById('shipSelect');
            const statusEl = document.getElementById('shipStatus');
            if (!select.value) {
                statusEl.style.display = 'none';
                return;
            }

            const capacity = parseInt(select.options[select.selectedIndex].getAttribute('data-capacity')) || 0;
            const totalCargo = calculateTotalCargo();

            statusEl.style.display = 'block';

            if (totalCargo > capacity) {
                statusEl.innerHTML = `<span class="cargo-critical" style="font-size:13px;font-weight:700;">
                    ⚠️ SHIP CANNOT CARRY THIS MUCH!<br>
                    Required: <strong>${totalCargo}</strong> SCU • Ship Capacity: ${capacity} SCU
                </span>`;
            } else if (totalCargo > capacity * 0.85) {
                statusEl.innerHTML = `<span class="cargo-warn">⚠ Nearly Full — ${totalCargo}/${capacity} SCU</span>`;
            } else {
                statusEl.innerHTML = `<span class="cargo-ok">✓ OK | ${totalCargo}/${capacity} SCU</span>`;
            }
        }

        function calculateTotalCargo() {
            let total = 0;
            for (let i = 1; i <= 10; i++) {
                const pickup = document.getElementById(`cargo-pickup${i}`);
                const delivery = document.getElementById(`cargo-delivery${i}`);
                if (pickup && pickup.value) total += parseInt(pickup.value) || 0;
                if (delivery && delivery.value) total += parseInt(delivery.value) || 0;
            }
            
            for (let i = 1; i <= splitContractCount; i++) {
                const cargo = document.getElementById(`split-cargo-${i}`);
                if (cargo && cargo.value) total += parseInt(cargo.value) || 0;
            }
            return total;
        }

        function routeMultiToSingle(start, pickups, deliveries) {
            let output = `TYPE: Multi Pickup → Single Dropoff\n`;
            output += "─".repeat(60) + "\n\n";
            
            let remaining = [...pickups];
            let totalCargo = pickups.reduce((sum, p) => sum + (p.cargo || 0), 0);
            const dropoffName = deliveries[0] ? deliveries[0].name : null;
            let current = start || (remaining.length > 0 ? remaining[0].name : null);
            let totalDist = 0;
            let ordered = [];

            // === START LOCATION PICKUP (if listed as pickup) ===
            if (start) {
                const startPickupIndex = remaining.findIndex(p => p.name === start);
                if (startPickupIndex !== -1) {
                    const startCargo = remaining[startPickupIndex];
                    ordered.push(startCargo);
                    remaining.splice(startPickupIndex, 1);
                    // No distance added - we're already there
                } else {
                    ordered.push({name: start, cargo: 0, isStart: true});
                }
            }

            // Force dropoff pickup to be LAST
            let lastPickup = null;
            if (dropoffName) {
                const idx = remaining.findIndex(p => p.name === dropoffName);
                if (idx !== -1) {
                    lastPickup = remaining.splice(idx, 1)[0];
                }
            }

            // Nearest neighbor for middle pickups
            while (remaining.length > 0) {
                if (!current) {
                    const next = remaining.shift();
                    ordered.push(next);
                    current = next.name;
                    continue;
                }

                let nearestIdx = 0;
                let minDist = getDistance(current, remaining[0].name);

                for (let i = 1; i < remaining.length; i++) {
                    let d = getDistance(current, remaining[i].name);
                    if (d < minDist) {
                        minDist = d;
                        nearestIdx = i;
                    }
                }

                const next = remaining.splice(nearestIdx, 1)[0];
                ordered.push(next);
                totalDist += minDist;
                current = next.name;
            }

            if (lastPickup) {
                ordered.push(lastPickup);
                totalDist += getDistance(current, lastPickup.name);
                current = lastPickup.name;
            }

            // Group same locations
            let grouped = [];
            for (let loc of ordered) {
                if (loc.isStart) {
                    grouped.push(loc);
                    continue;
                }
                const last = grouped[grouped.length - 1];
                if (last && last.name === loc.name) {
                    last.cargo = (last.cargo || 0) + (loc.cargo || 0);
                } else {
                    grouped.push({...loc});
                }
            }

            // Print
            grouped.forEach((loc, idx) => {
                const num = (idx + 1).toString().padStart(2, '0');
                if (loc.isStart && loc.cargo > 0) {
                    output += `${num}. [PICKUP] ${loc.name} (${loc.cargo}SCU) [Start Location]\n`;
                } else if (loc.isStart) {
                    output += `${num}. [START] ${loc.name}\n`;
                } else {
                    output += `${num}. [PICKUP] ${loc.name} (${loc.cargo || 0}SCU)\n`;
                }
            });

            const drop = deliveries[0];
            if (drop) {
                const finalD = getDistance(current, drop.name);
                totalDist += finalD;
                output += `${(grouped.length + 1).toString().padStart(2, '0')}. [DROP] ${drop.name} (${totalCargo}SCU) ─ ${finalD.toFixed(1)}GM\n`;
            }

            output += `\nTOTAL: ${totalDist.toFixed(1)}GM | ${totalCargo}SCU Cargo\n`;
            return output;
        }

        function calculateRoute() {
            const start = document.getElementById('startLocation').value;
            let pickups = [];
            let deliveries = [];
            
            for (let i = 1; i <= 10; i++) {
                const pSelect = document.getElementById(`pickup${i}`);
                const pVal = pSelect ? pSelect.value : '';
                const pCargo = parseInt(document.getElementById(`cargo-pickup${i}`)?.value) || 0;
                if (pVal && pVal !== '[ Skip ]' && pVal !== '') {
                    pickups.push({name: pVal, cargo: pCargo});
                }
                
                const dSelect = document.getElementById(`delivery${i}`);
                const dVal = dSelect ? dSelect.value : '';
                const dCargo = parseInt(document.getElementById(`cargo-delivery${i}`)?.value) || 0;
                if (dVal && dVal !== '[ Skip ]' && dVal !== '') {
                    deliveries.push({name: dVal, cargo: dCargo});
                }
            }

            if (pickups.length === 0 || deliveries.length === 0) {
                alert("Please add at least one pickup and one dropoff!");
                return;
            }

            let output = "CONTRACT ROUTES:\n";
            output += "═".repeat(60) + "\n\n";

            if (contractType === 'single-multi') {
                output += routeSingleToMulti(start, pickups, deliveries);
            } else {
                output += routeMultiToSingle(start, pickups, deliveries);
            }

            for (let i = 1; i <= splitContractCount; i++) {
                const from = document.getElementById(`split-from-${i}`)?.value;
                const to = document.getElementById(`split-to-${i}`)?.value;
                const cargo = parseInt(document.getElementById(`split-cargo-${i}`)?.value) || 0;
                if (from && to && from !== '[ Skip ]' && to !== '[ Skip ]') {
                    const dist = getDistance(from, to);
                    output += `\n─ SPLIT CONTRACT ${i}: ${from} → ${to} (${cargo}SCU)\n`;
                }
            }

            output += "\n" + "═".repeat(60);
            document.getElementById('route').textContent = output;
        }

        function routeSingleToMulti(start, pickups, deliveries) {
            let output = `TYPE: Single Pickup → Multi Dropoff\n`;
            output += "─".repeat(60) + "\n\n";
            
            const pickup = pickups[0];
            let current = start || pickup.name;
            let totalDist = 0;
            let totalCargo = pickup.cargo || 0;

            output += `01. [PICKUP] ${pickup.name} (${totalCargo}SCU)\n`;

            if (start && start !== pickup.name) {
                totalDist += getDistance(start, pickup.name);
            }

            let deliveryOrder = [...deliveries];
            current = pickup.name;

            for (let i = 0; i < deliveryOrder.length; i++) {
                const delivery = deliveryOrder[i];
                const dist = getDistance(current, delivery.name);
                totalDist += dist;
                output += `${(i + 2).toString().padStart(2, '0')}. [DROP] ${delivery.name} (${delivery.cargo}SCU) ─ ${dist.toFixed(1)}GM\n`;
                current = delivery.name;
            }

            output += `\nTOTAL: ${totalDist.toFixed(1)}GM | ${totalCargo}SCU Cargo\n`;
            return output;
        }

        // ... keep the rest of your script (saveState, loadState, setTheme, etc.) unchanged ...

		window.onload = () => {
			loadTheme();
			populateStart();
            setContractType('single-multi');
            
            document.addEventListener('change', () => saveState());
            window.addEventListener('beforeunload', saveState);
            
            loadState();
            updateShipStatus();
        };

 

        function saveState() {
            const state = {
                system: document.getElementById('systemFilter').value,
                ship: document.getElementById('shipSelect').value,
                start: document.getElementById('startLocation').value,
                contractType: contractType,
                pickups: Array.from(document.querySelectorAll('#pickups .loc-select')).map(el => ({
                    location: el.querySelector('select').value,
                    cargo: el.querySelector('input').value
                })),
                deliveries: Array.from(document.querySelectorAll('#deliveries .loc-select')).map(el => ({
                    location: el.querySelector('select').value,
                    cargo: el.querySelector('input').value
                }))
            };
            localStorage.setItem('scContractState', JSON.stringify(state));
            updateSaveIndicator('saved');
        }

        function loadState() {
            const saved = localStorage.getItem('scContractState');
            if (!saved) return;
            
            const state = JSON.parse(saved);
            document.getElementById('systemFilter').value = state.system || '';
            document.getElementById('shipSelect').value = state.ship || '';
            document.getElementById('startLocation').value = state.start || '';
            
            state.pickups?.forEach((p, i) => {
                const pickers = document.querySelectorAll('#pickups .loc-select');
                if (pickers[i]) {
                    pickers[i].querySelector('select').value = p.location;
                    pickers[i].querySelector('input').value = p.cargo;
                }
            });
            
            state.deliveries?.forEach((d, i) => {
                const delivers = document.querySelectorAll('#deliveries .loc-select');
                if (delivers[i]) {
                    delivers[i].querySelector('select').value = d.location;
                    delivers[i].querySelector('input').value = d.cargo;
                }
            });

            if (state.contractType) setContractType(state.contractType);
        }

        function updateSaveIndicator(status) {
            let indicator = document.getElementById('saveIndicator');
            if (!indicator) {
                indicator = document.createElement('div');
                indicator.id = 'saveIndicator';
                indicator.className = 'save-indicator';
                document.body.appendChild(indicator);
            }
            indicator.className = `save-indicator ${status}`;
     
	 }
		    function setTheme(theme) {
            let accent = '#f97316';
            let hover = '#ff8c42';
            
            if (theme === 'purple') { accent = '#a855f7'; hover = '#c084fc'; }
            else if (theme === 'green') { accent = '#22c55e'; hover = '#4ade80'; }
            else if (theme === 'blue') { accent = '#3b82f6'; hover = '#60a5fa'; }
            
            document.documentElement.style.setProperty('--accent', accent);
            document.documentElement.style.setProperty('--accent-hover', hover);
            document.documentElement.style.setProperty('--accent-text', theme === 'default' ? '#0f0f0f' : '#ffffff');
            
            localStorage.setItem('contractTheme', theme);
        }

        // Load saved theme
        function loadTheme() {
            const savedTheme = localStorage.getItem('contractTheme') || 'default';
            setTheme(savedTheme);
        }

		window.onload = () => {
			loadTheme();
			populateStart();
            setContractType('single-multi');
            
            document.addEventListener('change', () => saveState());
            window.addEventListener('beforeunload', saveState);
            
            loadState();
            updateShipStatus();
        };
    </script>
